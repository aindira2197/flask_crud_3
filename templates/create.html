<!DOCTYPE html>
<html>
<head>
    <title>Create Contact</title>
</head>
<body>

    <h1>Add Contact</h1>

    <form method="POST">

        <input
            type="text"
            name="fullname"
            placeholder="Full Name"
        >

        <br><br>

        <input
            type="text"
            name="phone"
            placeholder="Phone Number"
        >

        <br><br>

        <input
            type="email"
            name="email"
            placeholder="Email"
        >

        <br><br>

        <button type="submit">
            Save
        </button>

    </form>

</body>
</html>
